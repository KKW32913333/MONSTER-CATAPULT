<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#140d0a">
<title>MONSTER CATAPULT - モンスター・カタパルト</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="カタパルト">
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
:root{
  --void:#0e0906; --glow:#3a2010;
  --panel:#1c130d; --panel2:#26190f; --panel3:#301f12;
  --stone:#5a4028; --stone-lt:#7a5838; --stone-dark:#2a1c12;
  --ember:#ff7a3d; --ember2:#ff4d2b; --fire-grad:linear-gradient(180deg,#ffc172,#ff5a2b 55%,#d33f1c);
  --blue-grad:linear-gradient(180deg,#8fd6f2,#3a9fd4 55%,#1f6f96);
  --gold:#f0c04a; --gold-lt:#ffe9a8; --parchment:#f5e8d3; --dim:#a8927a; --dim2:#6b5844;
  --danger:#e2483a; --ok:#7fd66f; --ice:#5fc7e0; --purple:#b06bd6;
  --border:#4a3320; --border-lit:#8a6438;
  --ink:#2a2018;
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{
  margin:0; padding:0; min-height:100%;
  background:
    radial-gradient(ellipse 700px 500px at 50% -10%, var(--glow) 0%, transparent 60%),
    linear-gradient(180deg, #1a0f08 0%, var(--void) 40%);
  color:var(--parchment);
  font-family:"Hiragino Mincho ProN","Yu Mincho",Georgia,serif;
  overscroll-behavior:none; user-select:none;
}
#app{ max-width:430px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; position:relative; padding-bottom:68px; }
.hidden{ display:none !important; }

/* ---------- 共通トップバー（通貨） ---------- */
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 12px; gap:8px;
}
.logo{ font-size:15px; letter-spacing:.03em; text-shadow:0 2px 3px rgba(0,0,0,.6); }
.logo b{ color:var(--ember); text-shadow:0 0 10px rgba(255,122,61,.5), 0 2px 3px rgba(0,0,0,.6); }
.currency{
  display:flex; align-items:center; gap:6px;
  background:linear-gradient(180deg,#2a1c10,#160e08);
  border:1px solid var(--border-lit); border-radius:20px; padding:4px 14px 4px 6px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06), 0 2px 4px rgba(0,0,0,.4);
}
.currency .coin{
  width:20px; height:20px; border-radius:50%; flex:0 0 auto;
  background:radial-gradient(circle at 32% 28%, #fff6d8, var(--gold) 55%, #a9791e 100%);
  box-shadow:0 0 5px rgba(240,192,74,.7), inset 0 -2px 2px rgba(0,0,0,.25), inset 0 1px 1px rgba(255,255,255,.6);
}
.currency .val{ font-family:"Arial Black","Courier New",monospace; font-size:13.5px; color:var(--gold-lt); font-weight:bold; text-shadow:0 1px 2px rgba(0,0,0,.6); }

/* ---------- 画面共通 ---------- */
.screen{ flex:1; display:flex; flex-direction:column; padding:0 12px 12px; overflow-y:auto; }
.screen-title{ font-size:14px; letter-spacing:.08em; color:var(--dim); margin:2px 2px 10px; display:flex; align-items:center; gap:6px; }
.screen-title .bar{ flex:1; height:1px; background:linear-gradient(90deg, var(--border-lit), transparent); }

/* ---------- ワールドマップ ---------- */
#mapScroll{ position:relative; flex:1; min-height:520px; border:1px solid var(--border); border-radius:12px;
  background:
    radial-gradient(circle at 30% 15%, rgba(255,122,61,.14), transparent 45%),
    radial-gradient(circle at 80% 85%, rgba(255,90,43,.10), transparent 40%),
    linear-gradient(180deg, #231309 0%, #170d07 55%, #0e0906 100%);
  box-shadow:inset 0 0 40px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,255,255,.03);
  overflow:hidden; padding:14px 0;
}
.world-label{
  position:absolute; top:12px; left:50%; transform:translateX(-50%); z-index:3;
  font-size:11.5px; letter-spacing:.1em; color:#fff0da; font-weight:bold;
  background:linear-gradient(180deg,#6b3a1e,#3a1c0e); padding:5px 22px; border-radius:3px;
  box-shadow:0 3px 0 #200f06, 0 4px 8px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.15);
  border:1px solid #8a5228;
}
.world-label::before, .world-label::after{
  content:''; position:absolute; top:2px; width:0; height:0;
  border-top:12px solid #2a1409; border-bottom:12px solid transparent;
}
.world-label::before{ left:-10px; border-left:10px solid transparent; }
.world-label::after{ right:-10px; border-right:10px solid transparent; }
.map-path{ position:absolute; inset:0; }
.stage-node{
  position:absolute; width:54px; height:54px; margin-left:-27px; margin-top:-27px;
  border-radius:50%; display:flex; align-items:center; justify-content:center; flex-direction:column;
  background:radial-gradient(circle at 32% 26%, var(--stone-lt) 0%, var(--stone) 45%, var(--stone-dark) 100%);
  border:2px solid #2a1a0e; cursor:pointer; z-index:2;
  box-shadow:0 4px 0 rgba(0,0,0,.45), 0 6px 10px rgba(0,0,0,.4), inset 0 2px 3px rgba(255,255,255,.18), inset 0 -3px 5px rgba(0,0,0,.35);
}
.stage-node:active{ transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,.45), inset 0 2px 3px rgba(255,255,255,.18), inset 0 -3px 5px rgba(0,0,0,.35); }
.stage-node.locked{ background:radial-gradient(circle at 32% 26%, #3a342c, #16130f 80%); border-color:#1c1712; cursor:default; box-shadow:0 3px 0 rgba(0,0,0,.4), inset 0 -3px 5px rgba(0,0,0,.4); }
.stage-node.current{ border-color:var(--ember); box-shadow:0 4px 0 rgba(0,0,0,.45), 0 0 0 4px rgba(255,122,61,.22), 0 0 18px rgba(255,122,61,.6), inset 0 2px 3px rgba(255,255,255,.2); animation:nodepulse 1.8s ease-in-out infinite; }
@keyframes nodepulse{ 0%,100%{ filter:brightness(1);} 50%{ filter:brightness(1.18);} }
.stage-node .num{ font-size:17px; font-family:"Arial Black","Courier New",monospace; color:#fff2e0; text-shadow:0 2px 2px rgba(0,0,0,.6); }
.stage-node.locked .num{ color:#5a5044; }
.stage-node .stars{ font-size:8px; letter-spacing:1px; margin-top:1px; color:var(--gold); text-shadow:0 1px 1px rgba(0,0,0,.6); }
.stage-node .lock-icon{ font-size:15px; filter:drop-shadow(0 1px 1px rgba(0,0,0,.6)); }
.stage-node .boss-badge{
  position:absolute; top:-9px; font-size:8.5px; font-weight:bold; letter-spacing:.05em;
  background:linear-gradient(180deg,#ff6a52,var(--danger)); color:#fff; padding:2px 7px; border-radius:8px;
  box-shadow:0 2px 0 #8f2418, 0 3px 5px rgba(0,0,0,.4); border:1px solid #ff9a86;
}

/* ---------- パネル/カード共通 ---------- */
.panel{
  background:linear-gradient(180deg, var(--panel2), var(--panel));
  border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:10px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04), 0 2px 6px rgba(0,0,0,.25);
}
.panel-label{ font-size:11.5px; letter-spacing:.06em; color:var(--dim); margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; font-weight:bold; }

/* ---------- モンスターカード ---------- */
.monster-card{
  display:flex; gap:10px; background:linear-gradient(180deg, var(--panel3), var(--panel2));
  border:1px solid var(--border); border-radius:10px;
  padding:10px; margin-bottom:8px; align-items:center;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 2px 5px rgba(0,0,0,.3);
}
.monster-card.locked{ opacity:.55; }
.m-icon{
  width:54px; height:54px; border-radius:50%; flex:0 0 auto; display:flex; align-items:center; justify-content:center;
  font-size:26px; background-size:cover; background-position:center;
  box-shadow:inset 0 0 12px rgba(0,0,0,.5), inset 0 2px 3px rgba(255,255,255,.15), 0 2px 4px rgba(0,0,0,.4);
  border:2px solid rgba(255,255,255,.08);
}
.m-body{ flex:1; min-width:0; }
.m-head{ display:flex; justify-content:space-between; align-items:baseline; gap:6px; }
.m-name{ font-size:13.5px; letter-spacing:.02em; font-weight:bold; }
.m-lv{ font-size:10.5px; color:var(--gold); font-family:"Courier New",monospace; font-weight:bold; }
.m-special{ font-size:10.5px; color:var(--ember); margin:3px 0 6px; line-height:1.4; }
.stat-row{ display:flex; align-items:center; gap:6px; margin-bottom:3px; }
.stat-row .stat-label{ font-size:9px; color:var(--dim); width:34px; flex:0 0 auto; letter-spacing:.05em; }
.stat-bar{
  flex:1; height:6px; border-radius:3px; background:#00000066; overflow:hidden;
  box-shadow:inset 0 1px 2px rgba(0,0,0,.6);
  background-image:repeating-linear-gradient(90deg, transparent 0 calc(10% - 1px), rgba(0,0,0,.35) calc(10% - 1px) 10%);
}
.stat-bar-fill{ height:100%; border-radius:3px; box-shadow:inset 0 1px 0 rgba(255,255,255,.3); }
.stat-bar-fill.power{ background:linear-gradient(90deg,#ff8a5a,var(--ember2)); }
.stat-bar-fill.weight{ background:linear-gradient(90deg,#8ab0d6,#4a6a94); }
.m-action{ flex:0 0 auto; text-align:center; }
.m-action .btn{ padding:8px 11px; font-size:11px; margin:0; white-space:nowrap; }
.m-action .cost{ font-size:10.5px; color:var(--gold); margin-top:5px; font-family:"Courier New",monospace; font-weight:bold; }

/* ---------- ボタン（立体ベベル） ---------- */
.btn{
  font-family:inherit; letter-spacing:.05em; font-size:13px;
  background:var(--fire-grad); color:#4a1e08; font-weight:bold;
  border:1px solid #a83c17; border-radius:8px;
  padding:11px 16px; cursor:pointer; margin-bottom:8px;
  box-shadow:0 3px 0 #a03216, 0 5px 8px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.4);
  text-shadow:0 1px 0 rgba(255,255,255,.25);
  transition:transform .05s;
}
.btn:active{ filter:brightness(.95); transform:translateY(2px); box-shadow:0 1px 0 #a03216, inset 0 1px 0 rgba(255,255,255,.4); }
.btn-ghost{
  background:linear-gradient(180deg,#3a281a,#241608); border:1px solid var(--border);
  color:var(--parchment); font-weight:normal; box-shadow:0 3px 0 #120a04, inset 0 1px 0 rgba(255,255,255,.06);
  text-shadow:none;
}
.btn-ghost:active{ box-shadow:0 1px 0 #120a04; }
.btn-full{ width:100%; }
.btn:disabled{ opacity:.4; filter:grayscale(.5); cursor:default; box-shadow:none; transform:none; }

/* ---------- ミッション ---------- */
.mission-card{
  background:linear-gradient(180deg, var(--panel3), var(--panel2)); border:1px solid var(--border); border-radius:10px;
  padding:10px 12px; margin-bottom:8px; box-shadow:0 2px 5px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.04);
}
.mission-card.done{ border-color:var(--ok); box-shadow:0 0 0 1px rgba(127,214,111,.3), 0 2px 5px rgba(0,0,0,.3); }
.mission-text{ font-size:12.5px; margin-bottom:6px; display:flex; justify-content:space-between; gap:6px; font-weight:bold; }
.mission-reward{ color:var(--gold); font-size:11px; white-space:nowrap; font-family:"Courier New",monospace; }
.progress-bar{ height:8px; border-radius:4px; background:#00000066; overflow:hidden; margin-bottom:6px; box-shadow:inset 0 1px 2px rgba(0,0,0,.6); }
.progress-fill{ height:100%; background:linear-gradient(180deg,#8fd6f2,#3a9fd4); width:0%; transition:width .3s; box-shadow:inset 0 1px 0 rgba(255,255,255,.4); }
.mission-foot{ display:flex; justify-content:space-between; align-items:center; }
.mission-foot .count{ font-size:10.5px; color:var(--dim); font-family:"Courier New",monospace; }
.claim-btn{ font-size:11px; padding:6px 14px; margin:0; }

/* ---------- タブ ---------- */
.tabs{ display:flex; gap:6px; margin-bottom:10px; }
.tab{ flex:1; text-align:center; padding:8px 4px; border-radius:6px; background:var(--panel2); border:1px solid var(--border); font-size:12px; cursor:pointer; }
.tab.active{ border-color:var(--ember); color:var(--ember); background:var(--panel3); }

/* ---------- ゲーム画面 ---------- */
#screen-game{ padding:0; display:flex; flex-direction:column; }
.game-hud{ display:flex; justify-content:space-between; align-items:flex-start; padding:10px 10px 0; position:relative; z-index:5; }
.hud-left{ display:flex; align-items:center; gap:8px; }
.pause-btn{
  width:34px; height:34px; border-radius:9px; flex:0 0 auto;
  background:linear-gradient(180deg,#3a281a,#1c1108); border:1px solid #100a04;
  display:flex; align-items:center; justify-content:center; font-size:13px; cursor:pointer; color:#fff;
  box-shadow:0 3px 0 #0c0703, inset 0 1px 0 rgba(255,255,255,.12);
}
.hud-pill{
  background:linear-gradient(180deg,#fff8ec,#e8dcc4); color:var(--ink); border-radius:20px;
  padding:5px 14px; box-shadow:0 3px 0 rgba(0,0,0,.3), inset 0 1px 0 #fff, inset 0 -2px 3px rgba(0,0,0,.08);
  text-align:center; min-width:64px;
}
.hud-pill .label{ font-size:8px; letter-spacing:.09em; color:#8a7458; font-weight:bold; display:block; }
.hud-pill .value{ font-size:15px; font-family:"Arial Black","Courier New",monospace; font-weight:bold; line-height:1.15; }
.hud-pill.stage-pill{ text-align:left; padding:5px 12px; }
.hud-pill.stage-pill .value{ font-size:12.5px; }
.hud-pill.stage-pill .stars{ color:var(--gold); font-size:9px; letter-spacing:1px; display:block; }
.hud-center .hud-pill .value{ color:var(--danger); }
.hud-right{ display:flex; flex-direction:column; gap:6px; align-items:flex-end; }
.hud-right .hud-pill{ min-width:78px; }
.hud-right .hud-pill.score .value{ color:#b8830f; }

#canvasWrap{ position:relative; width:100%; aspect-ratio:390/460; background:#0d0906; overflow:hidden; margin-top:-6px; }
canvas{ display:block; width:100%; height:100%; touch-action:none; }

.game-footer{ display:flex; align-items:center; gap:8px; padding:8px 10px 14px; }
.next-panel{
  flex:1; display:flex; align-items:center; gap:6px;
  background:linear-gradient(180deg,#1c1108,#120a05); border:1px solid var(--border); border-radius:10px;
  padding:6px 8px; overflow-x:auto; box-shadow:inset 0 2px 4px rgba(0,0,0,.5);
}
.next-panel .cap{ font-size:9px; color:var(--dim); letter-spacing:.05em; flex:0 0 auto; font-weight:bold; }
.next-chip{
  position:relative; width:32px; height:32px; border-radius:50%; flex:0 0 auto;
  background:radial-gradient(circle at 32% 26%, #3a281a, #1c1108 80%);
  border:1px solid var(--border-lit); display:flex; align-items:center; justify-content:center; font-size:15px;
  box-shadow:inset 0 1px 2px rgba(255,255,255,.1), 0 2px 3px rgba(0,0,0,.4);
}
.next-chip .qty{
  position:absolute; bottom:-4px; right:-4px; background:linear-gradient(180deg,#ff6a52,var(--ember2));
  color:#fff; font-size:8.5px; font-weight:bold; border-radius:8px; padding:1px 5px;
  font-family:"Courier New",monospace; box-shadow:0 1px 0 #8f2418, 0 0 0 1.5px #1c1108;
}
.mini-btn{
  width:46px; height:46px; border-radius:10px; flex:0 0 auto; cursor:pointer;
  background:linear-gradient(180deg,#3a281a,#1c1108); border:1px solid #100a04;
  font-size:12px; display:flex; align-items:center; justify-content:center; color:var(--parchment);
  box-shadow:0 3px 0 #0c0703, inset 0 1px 0 rgba(255,255,255,.1);
}
.mini-btn:active{ transform:translateY(2px); box-shadow:0 1px 0 #0c0703; }
.mini-btn.speed{ background:var(--blue-grad); color:#0a2a38; font-weight:bold; border-color:#1a6a8a; box-shadow:0 3px 0 #185870, inset 0 1px 0 rgba(255,255,255,.4); text-shadow:0 1px 0 rgba(255,255,255,.3); }
.mini-btn.fire{ background:var(--fire-grad); border-color:#a83c17; box-shadow:0 3px 0 #a03216, inset 0 1px 0 rgba(255,255,255,.4); font-size:16px; }
.mini-btn.fire.active{ box-shadow:0 1px 0 #a03216, 0 0 0 3px rgba(255,122,61,.35); transform:translateY(2px); }

/* ---------- 結果オーバーレイ ---------- */
.overlay{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(6,4,3,.88); z-index:60; padding:20px; }
.overlay.hidden{ display:none; }
.overlay-box{
  background:linear-gradient(180deg,var(--panel2),var(--panel)); border:1px solid var(--border-lit); border-radius:14px;
  padding:22px 20px; text-align:center; max-width:320px; width:100%;
  box-shadow:0 10px 30px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.06);
}
.overlay-box h2{ font-size:21px; font-weight:bold; letter-spacing:.06em; margin:4px 0 4px; text-shadow:0 2px 3px rgba(0,0,0,.5); }
.overlay-box h2.win{ color:var(--gold); }
.overlay-box h2.lose{ color:var(--danger); }
.result-stars{ font-size:26px; letter-spacing:8px; margin:8px 0; color:#4a3a28; }
.result-stars .lit{ color:var(--gold); text-shadow:0 0 10px rgba(240,192,74,.7); }
.overlay-box .stat-line{ display:flex; justify-content:space-around; margin:12px 0; }
.overlay-box .stat-line div{ text-align:center; }
.overlay-box .stat-line .label{ font-size:9.5px; color:var(--dim); display:block; }
.overlay-box .stat-line .value{ font-size:17px; font-family:"Courier New",monospace; color:var(--gold); display:block; margin-top:2px; font-weight:bold; }
.overlay-box p.desc{ font-size:11.5px; color:var(--dim); line-height:1.6; margin:6px 0 14px; }

/* ---------- 下部ナビ ---------- */
.bottom-nav{
  position:fixed; left:0; right:0; bottom:0; max-width:430px; margin:0 auto;
  display:flex; background:linear-gradient(180deg,#1c130d,#140d08); border-top:1px solid var(--border-lit); z-index:20;
  box-shadow:0 -4px 12px rgba(0,0,0,.4);
}
.nav-item{ position:relative; flex:1; text-align:center; padding:8px 2px 7px; cursor:pointer; color:var(--dim); }
.nav-item.active{ color:var(--ember); }
.nav-item.active .icon{ filter:drop-shadow(0 0 5px rgba(255,122,61,.7)); }
.nav-item .icon{ font-size:19px; display:block; }
.nav-item .txt{ font-size:9.5px; margin-top:2px; letter-spacing:.02em; }
.nav-dot{ position:absolute; margin-left:14px; margin-top:-2px; width:7px; height:7px; border-radius:50%; background:var(--danger); box-shadow:0 0 4px rgba(226,72,58,.8); }

.ranking-list{ list-style:none; margin:0 0 10px; padding:0; }
.ranking-list li{ display:flex; justify-content:space-between; padding:7px 4px; font-size:12.5px; border-bottom:1px solid var(--border); }
.ranking-list li .rank{ color:var(--gold); width:26px; flex:0 0 auto; font-weight:bold; }
.ranking-list .dim{ color:var(--dim); text-align:center; justify-content:center; }
.text-input{ width:100%; padding:9px 10px; border-radius:6px; border:1px solid var(--border); background:var(--panel2); color:var(--parchment); font-family:inherit; font-size:13px; margin-bottom:8px; box-shadow:inset 0 1px 3px rgba(0,0,0,.5); }
.footnote{ font-size:10px; color:var(--dim2); text-align:center; line-height:1.6; padding:6px 4px 2px; }
</style>
</head>
<body>
<div id="app">

  <!-- ===================== 共通トップバー ===================== -->
  <div class="topbar" id="topbar">
    <div class="logo">🎯 <b>MONSTER</b> CATAPULT</div>
    <div class="currency"><span class="coin"></span><span class="val" id="goldTop">0</span></div>
  </div>

  <!-- ===================== ステージ（ワールドマップ） ===================== -->
  <section id="screen-map" class="screen">
    <div class="screen-title">ステージ選択<div class="bar"></div></div>
    <div id="mapScroll">
      <div class="world-label">WORLD 1・火山の丘</div>
      <div class="map-path" id="mapPath"></div>
    </div>
  </section>

  <!-- ===================== モンスター（図鑑） ===================== -->
  <section id="screen-monsters" class="screen hidden">
    <div class="screen-title">モンスター図鑑<div class="bar"></div></div>
    <div id="monsterList"></div>
  </section>

  <!-- ===================== ショップ ===================== -->
  <section id="screen-shop" class="screen hidden">
    <div class="screen-title">ショップ<div class="bar"></div></div>
    <div id="shopList"></div>
  </section>

  <!-- ===================== ミッション ===================== -->
  <section id="screen-missions" class="screen hidden">
    <div class="screen-title">デイリーミッション<div class="bar"></div></div>
    <p class="footnote" style="margin-bottom:8px;">毎日0時に更新されます（この試作版では日付が変わると自動更新）</p>
    <div id="missionList"></div>
  </section>

  <!-- ===================== ランキング ===================== -->
  <section id="screen-ranking" class="screen hidden">
    <div class="screen-title">オンラインランキング<div class="bar"></div></div>
    <div class="panel">
      <div class="panel-label">🏆 合計スコア TOP10</div>
      <ol class="ranking-list" id="rankingList"><li class="dim">読み込み中…</li></ol>
      <button class="btn btn-ghost btn-full" id="refreshRankingBtn">再読み込み</button>
    </div>
    <div class="panel">
      <div class="panel-label">📮 自分の合計スコアを送信</div>
      <div class="stat-line" style="margin:0 0 10px;"><div><span class="label">現在の合計スコア</span><span class="value" id="myTotalScore">0</span></div></div>
      <input id="nameInput" maxlength="12" placeholder="冒険者の名前" class="text-input">
      <button class="btn btn-full" id="submitScoreBtn">ランキングに送信</button>
    </div>
  </section>

  <!-- ===================== ゲーム画面 ===================== -->
  <section id="screen-game" class="screen hidden" style="padding-bottom:0;">
    <div class="game-hud">
      <div class="hud-left">
        <div class="pause-btn" id="pauseBtn">⏸</div>
        <div class="hud-pill stage-pill">STAGE <span id="stageLabel">1</span><span class="stars" id="stageStarsHud">☆☆☆</span></div>
      </div>
      <div class="hud-center"><div class="hud-pill"><span class="label">ENEMIES</span><span class="value" id="enemyVal">0/0</span></div></div>
      <div class="hud-right">
        <div class="hud-pill"><span class="label">SHOTS</span><span class="value" id="ammoVal">0</span></div>
        <div class="hud-pill score"><span class="label">SCORE</span><span class="value" id="scoreVal">0</span></div>
      </div>
    </div>
    <div id="canvasWrap"><canvas id="game" width="390" height="460"></canvas></div>
    <div class="game-footer">
      <div class="next-panel"><span class="cap">NEXT</span><div id="queueTray" style="display:flex; gap:6px;"></div></div>
      <div class="mini-btn" id="skipBtn">⏭</div>
      <div class="mini-btn speed" id="speedBtn">x1</div>
      <div class="mini-btn fire" id="hintBtn" title="狙いの軌道プレビュー">🔥</div>
    </div>
  </section>

  <div class="bottom-nav" id="bottomNav">
    <div class="nav-item" data-nav="shop"><span class="icon">🛒</span><span class="txt">ショップ</span></div>
    <div class="nav-item" data-nav="monsters"><span class="icon">👾</span><span class="txt">モンスター</span></div>
    <div class="nav-item active" data-nav="map"><span class="icon">🗺️</span><span class="txt">ステージ</span></div>
    <div class="nav-item" data-nav="missions"><span class="icon">📋</span><span class="txt">ミッション</span><span class="nav-dot hidden" id="missionDot"></span></div>
    <div class="nav-item" data-nav="ranking"><span class="icon">🏆</span><span class="txt">ランキング</span></div>
  </div>

  <div class="overlay hidden" id="overlay">
    <div class="overlay-box">
      <h2 id="overlayTitle"></h2>
      <div class="result-stars" id="overlayStars"></div>
      <div class="stat-line">
        <div><span class="label">獲得スコア</span><span class="value" id="overlayScore">0</span></div>
        <div><span class="label">獲得ゴールド</span><span class="value" id="overlayGold">0</span></div>
      </div>
      <p class="desc" id="overlayText"></p>
      <button class="btn btn-full" id="overlayPrimaryBtn">次へ</button>
      <button class="btn btn-ghost btn-full" id="overlaySecondaryBtn">タイトルへ戻る</button>
    </div>
  </div>

</div>

<script src="mc-firebase.js"></script>
<script src="mc-game.js"></script>
<script>
  if('serviceWorker' in navigator){
    window.addEventListener('load', ()=>{
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    });
  }
</script>
</body>
</html>
